name: boundary

on:
  pull_request:
    paths:
      - "package.json"
      - "packages/**/package.json"
      - "packages/**/src/**"
      - "scripts/check-engram-boundary.ts"
      - ".github/workflows/boundary.yml"
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "packages/**/package.json"
      - "packages/**/src/**"
      - "scripts/check-engram-boundary.ts"
      - ".github/workflows/boundary.yml"

jobs:
  engram-boundary:
    name: Compost/Engram boundary
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check Compost/Engram boundary
        run: bun run check:engram-boundary
