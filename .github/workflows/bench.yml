name: bench

# Run the layered bench harness on every PR + main push.
# See bench/README.md for per-layer descriptions.
#
# Network-dependent benches (lancedb-ann, llm-latency) are skipped here
# because GitHub Actions runners do not have Ollama / LanceDB pre-warmed.
# Run them locally with `COMPOST_BENCH_NETWORK=true bun run bench`.

on:
  pull_request:
    paths:
      - 'packages/**'
      - 'bench/**'
      - '.github/workflows/bench.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'bench/**'
      - '.github/workflows/bench.yml'

jobs:
  bench:
    name: Layered performance bench
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run SQLite reflect bench
        run: bun bench/sqlite-reflect.bench.ts | tee bench-reflect.jsonl

      - name: Run SQLite query (BM25) bench
        run: bun bench/sqlite-query.bench.ts | tee bench-query.jsonl

      # Network-gated benches are no-ops in CI (emit skipped: true) but we
      # still invoke them so the stubs stay wired up. They exit 0 when
      # gated off, so they do not block the build.
      - name: Run LanceDB ANN bench (gated, no-op in CI)
        run: bun bench/lancedb-ann.bench.ts

      - name: Run LLM latency bench (gated, no-op in CI)
        run: bun bench/llm-latency.bench.ts

      - name: Upload bench artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bench-results-${{ github.sha }}
          path: bench-*.jsonl
          retention-days: 30

      # Regression gate will land once baseline.json is committed.
      # For now we just publish the numbers and let humans eyeball them.
      # Planned: bench/lib/compare.ts results.jsonl bench/baseline.json → fail if >1.5× p95.
