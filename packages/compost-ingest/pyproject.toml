[project]
name = "compost-ingest"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "jsonschema>=4.20.0",
    "trafilatura>=1.12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
